name: Sync Forks

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Sync all forks
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

          USER=$(curl -s -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/user | jq -r .login)

          echo "Current user: $USER"

          REPOS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/users/$USER/repos?per_page=100" \
            | jq -r '.[] | select(.fork == true) | .name')

          for REPO in $REPOS; do
            echo "========================="
            echo "Syncing $REPO"
            echo "========================="

            git clone https://x-access-token:$GH_TOKEN@github.com/$USER/$REPO.git

            cd $REPO

            UPSTREAM=$(curl -s -H "Authorization: token $GH_TOKEN" \
              https://api.github.com/repos/$USER/$REPO \
              | jq -r '.parent.clone_url')

            git remote add upstream $UPSTREAM

            git fetch upstream

            DEFAULT_BRANCH=$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')

            git checkout $DEFAULT_BRANCH

            git merge upstream/$DEFAULT_BRANCH --allow-unrelated-histories || true

            git push origin $DEFAULT_BRANCH || true

            cd ..

            rm -rf $REPO
          done