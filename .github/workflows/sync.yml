name: Sync Forks

on:
  schedule:
    # 中国时间每天凌晨 0 点
    - cron: '0 16 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Sync all fork repositories
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

        run: |
          set +e

          echo "====================================="
          echo "Starting fork synchronization..."
          echo "====================================="

          # 安装依赖
          sudo apt-get update
          sudo apt-get install -y jq git

          # 清理磁盘空间
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/share/boost || true
          sudo docker system prune -af || true

          # 禁用 Git LFS 下载（避免大仓库超时）
          export GIT_LFS_SKIP_SMUDGE=1

          # Git 身份
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 获取当前用户
          USER=$(curl -s \
            -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/user | jq -r .login)

          echo "Current User: $USER"

          SUCCESS_COUNT=0
          FAIL_COUNT=0
          PAGE=1

          while true; do

            echo ""
            echo "====================================="
            echo "Fetching repository page: $PAGE"
            echo "====================================="

            # 获取所有 fork 仓库（包括 private）
            RESPONSE=$(curl -s \
              -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/user/repos?visibility=all&affiliation=owner&per_page=100&page=$PAGE")

            REPOS=$(echo "$RESPONSE" \
              | jq -r '.[] | select(.fork == true) | .name')

            # 没有更多仓库
            if [ -z "$REPOS" ]; then
              echo "No more repositories found."
              break
            fi

            echo ""
            echo "Fork repositories found:"
            echo "$REPOS"

            for REPO in $REPOS; do

              echo ""
              echo "====================================="
              echo "Syncing repository: $REPO"
              echo "====================================="

              (
                # 清理旧目录
                rm -rf "$REPO"

                echo "Cloning repository..."

                git clone \
                  --depth=1 \
                  --single-branch \
                  "https://x-access-token:$GH_TOKEN@github.com/$USER/$REPO.git"

                if [ $? -ne 0 ]; then
                  echo "Clone failed."
                  exit 1
                fi

                cd "$REPO" || exit 1

                echo "Getting upstream repository..."

                # 获取 upstream
                UPSTREAM=$(curl -s \
                  -H "Authorization: token $GH_TOKEN" \
                  "https://api.github.com/repos/$USER/$REPO" \
                  | jq -r '.parent.clone_url')

                if [ "$UPSTREAM" = "null" ] || [ -z "$UPSTREAM" ]; then
                  echo "No upstream repository found."
                  exit 1
                fi

                echo "Upstream: $UPSTREAM"

                git remote add upstream "$UPSTREAM"

                echo "Fetching upstream..."

                git fetch upstream

                if [ $? -ne 0 ]; then
                  echo "Fetch upstream failed."
                  exit 1
                fi

                # 获取默认分支
                DEFAULT_BRANCH=$(git remote show origin \
                  | sed -n '/HEAD branch/s/.*: //p')

                if [ -z "$DEFAULT_BRANCH" ]; then
                  DEFAULT_BRANCH="main"
                fi

                echo "Default branch: $DEFAULT_BRANCH"

                git checkout "$DEFAULT_BRANCH"

                echo "Pulling upstream changes..."

                git pull --rebase upstream "$DEFAULT_BRANCH"

                if [ $? -ne 0 ]; then
                  echo "Rebase failed. Trying hard reset..."

                  git rebase --abort || true

                  git fetch upstream

                  git reset --hard upstream/"$DEFAULT_BRANCH"
                fi

                echo "Pushing changes..."

                git push origin "$DEFAULT_BRANCH" --force

                if [ $? -ne 0 ]; then
                  echo "Push failed."
                  exit 1
                fi

                echo "Repository synced successfully."

              )

              # 检查同步结果
              if [ $? -eq 0 ]; then
                SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                echo "SUCCESS: $REPO"
              else
                FAIL_COUNT=$((FAIL_COUNT + 1))
                echo "FAILED: $REPO"
              fi

              echo ""
              echo "Finished: $REPO"
              echo "====================================="

              # 删除仓库释放空间
              rm -rf "$REPO"

            done

            PAGE=$((PAGE + 1))

          done

          echo ""
          echo "====================================="
          echo "Synchronization completed."
          echo "====================================="
          echo "Successful: $SUCCESS_COUNT"
          echo "Failed: $FAIL_COUNT"
          echo "====================================="
