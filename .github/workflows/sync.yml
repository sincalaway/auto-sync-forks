name: Sync Forks

on:
  schedule:
    # 中国时间每天凌晨 0 点 (UTC 16:00)
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Sync all fork repositories
        env:
          # 必须使用具有 'repo' 权限的 Personal Access Token (PAT)
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          
        run: |
          set +e

          # 1. 安装依赖并清理空间
          sudo apt-get update
          sudo apt-get install -y jq git

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo docker system prune -af || true

          # 2. 配置 Git 身份信息 (避免 rebase 时报错)
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 3. 获取当前 Token 绑定的用户名
          USER=$(curl -s \
            -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/user | jq -r .login)

          echo "====================================="
          echo "Current User: $USER"
          echo "====================================="

          PAGE=1

          # 4. 分页遍历并同步仓库
          while true; do
            echo -e "\nFetching page $PAGE ...\n"

            REPOS=$(curl -s \
              -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/users/$USER/repos?per_page=100&page=$PAGE" \
              | jq -r '.[] | select(.fork == true) | .name')

            # 如果这一页为空，结束循环
            if [ -z "$REPOS" ]; then
              echo "No more repositories."
              break
            fi

            for REPO in $REPOS; do
              echo -e "\n====================================="
              echo "Syncing repository: $REPO"
              echo "====================================="

              # 使用子 Shell 让每个仓库独立运行，互不干扰
              (
                rm -rf "$REPO"

                git clone --depth=1 --single-branch \
                   "https://x-access-token:$GH_TOKEN@github.com/$USER/$REPO.git"

                cd "$REPO" || exit

                # 获取 upstream 地址
                UPSTREAM=$(curl -s \
                  -H "Authorization: token $GH_TOKEN" \
                  "https://api.github.com/repos/$USER/$REPO" \
                  | jq -r '.parent.clone_url')

                if [ "$UPSTREAM" = "null" ]; then
                  echo "No upstream found, skipping..."
                  exit
                fi

                git remote add upstream "$UPSTREAM"
                git fetch upstream

                # 获取默认分支名称 (main, master 等)
                DEFAULT_BRANCH=$(git remote show origin \
                  | sed -n '/HEAD branch/s/.*: //p')

                echo "Default branch: $DEFAULT_BRANCH"

                git checkout "$DEFAULT_BRANCH"

                # 使用 rebase 同步
                git pull --rebase upstream "$DEFAULT_BRANCH"

                # 推送至自己的远程仓库
                git push origin "$DEFAULT_BRANCH"

                echo "Repository synced successfully."

              ) || echo "Failed to sync $REPO, skipped."

              echo -e "\nFinished: $REPO\n"
            done

            PAGE=$((PAGE + 1))
          done

          echo -e "\n====================================="
          echo "All synchronization tasks completed."
          echo "====================================="
